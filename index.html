<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Assinatura — Líbero Seguros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #0055ff;
    --cyan: #00bcff;
    --black: #111111;
    --gray: #555555;
    --light: #f5f6fa;
    --border: #e2e5ef;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header img.logo {
    height: 36px;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 14px;
    color: var(--gray);
    margin-top: 6px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 2px 16px rgba(0,0,30,0.06);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  @media (max-width: 660px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 24px 16px; }
    .card { padding: 20px; }
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aab0c6;
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--black);
    margin-bottom: 6px;
  }

  .field input[type="text"],
  .field input[type="email"],
  .field input[type="tel"] {
    width: 100%;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--black);
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,85,255,0.1);
    background: #fff;
  }

  /* FOTO UPLOAD */
  .photo-upload {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .photo-preview {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--light);
    object-fit: cover;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .photo-preview:hover { border-color: var(--blue); }

  .photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .photo-preview .placeholder-icon {
    color: #c0c6d8;
  }

  .photo-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-upload {
    padding: 7px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    background: rgba(0,85,255,0.07);
    border: 1px solid rgba(0,85,255,0.2);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-upload:hover { background: rgba(0,85,255,0.13); }

  .btn-remove {
    padding: 5px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: #999;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    display: none;
  }
  .btn-remove:hover { color: #e05; border-color: #e05; }
  .btn-remove.visible { display: block; }

  .photo-hint {
    font-size: 11px;
    color: #aab0c6;
    margin-top: 2px;
  }

  /* PREVIEW */
  .preview-box {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin-bottom: 16px;
  }

  .sig-inner {
    background: #fff;
    border-radius: 6px;
    padding: 16px 18px;
    border: 1px solid var(--border);
  }

  .copy-btn {
    width: 100%;
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .copy-btn:hover { background: #0044dd; }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.success { background: #1a7a4a; }

  .hint {
    font-size: 12px;
    color: #aab0c6;
    margin-top: 10px;
    line-height: 1.6;
    text-align: center;
  }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: #aab0c6;
  }
</style>
</head>

  <h1>Gerador de Assinatura de E-mail</h1>

<div class="card">
  <div class="grid">

    <!-- FORMULÁRIO -->
    <div>
      <div class="section-label">Seus dados</div>

      <!-- FOTO -->
      <div class="field">
        <label>Foto de perfil <span style="color:#aab0c6;font-weight:400">(opcional)</span></label>
        <div class="photo-upload">
          <div class="photo-preview" id="photo-circle" onclick="document.getElementById('photo-input').click()">
            <svg class="placeholder-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
          <div class="photo-actions">
            <button class="btn-upload" onclick="document.getElementById('photo-input').click()">Escolher foto</button>
            <button class="btn-remove" id="btn-remove" onclick="removePhoto()">Remover</button>
            <span class="photo-hint">JPG ou PNG, rosto centralizado</span>
          </div>
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(this)">
      </div>

      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="inp-name" placeholder="Ex: João Silva" oninput="render()">
      </div>
      <div class="field">
        <label>Cargo</label>
        <input type="text" id="inp-role" placeholder="Ex: Consultor de Seguros" oninput="render()">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="tel" id="inp-phone" placeholder="Ex: (11) 99999-0000" oninput="render()">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="text" id="inp-email" placeholder="Ex: joao@liberoseguros.com.br" oninput="render()">
      </div>
    </div>

    <!-- PREVIEW -->
    <div>
      <div class="section-label">Preview</div>
      <div class="preview-box">
        <div class="sig-inner" id="sig-preview"></div>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyHTML()">Copiar HTML da assinatura</button>
      <p class="hint">
        Gmail: Configurações → Ver todas → Assinatura → Cole o HTML<br>
        Outlook: Arquivo → Opções → Email → Assinaturas
      </p>
    </div>

  </div>
</div>

let photoDataURL = null;

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    photoDataURL = e.target.result;

    // Atualiza o círculo de preview
    const circle = document.getElementById('photo-circle');
    circle.innerHTML = `<img src="${photoDataURL}" alt="Foto">`;

    // Mostra botão remover
    document.getElementById('btn-remove').classList.add('visible');

    render();
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  photoDataURL = null;
  const circle = document.getElementById('photo-circle');
  circle.innerHTML = `<svg class="placeholder-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>`;
  document.getElementById('btn-remove').classList.remove('visible');
  document.getElementById('photo-input').value = '';
  render();
}

function buildSig(name, role, phone, email) {
  const n = name || 'Seu Nome';
  const r = role || 'Cargo';
  const p = phone || '(11) 00000-0000';
  const e = email || 'email@liberoseguros.com.br';

  const photoCell = photoDataURL ? `
    <td style="padding:0;vertical-align:top;padding-right:16px;">
      <img src="${photoDataURL}" alt="${n}" width="64" height="64"
        style="display:block;width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid #e2e5ef;">
    </td>` : '';

  return `<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;border-collapse:collapse;">
  <tr>
    ${photoCell}
    <td style="padding:0;vertical-align:middle;padding-right:16px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="width:3px;padding:0;background:linear-gradient(to bottom,#0055ff,#00bcff);border-radius:2px;">&nbsp;</td>
          <td style="width:14px;padding:0;">&nbsp;</td>
          <td style="padding:0;vertical-align:top;">
            <p style="margin:0;font-size:15px;font-weight:700;color:#111111;line-height:1.3;">${n}</p>
            <p style="margin:3px 0 0;font-size:12px;font-weight:500;color:#0055ff;">${r}</p>
            <p style="margin:10px 0 0;font-size:11px;color:#555555;line-height:1.9;">
              ${p}<br>
              <a href="mailto:${e}" style="color:#0055ff;text-decoration:none;">${e}</a><br>
              <a href="https://www.liberoseguros.com.br" style="color:#0055ff;text-decoration:none;">www.liberoseguros.com.br</a>
            </p>
            <p style="margin:14px 0 0;">
              <img src="${LOGO}" alt="Líbero Seguros" height="32" style="display:block;">
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`;
}

function render() {
  const n = document.getElementById('inp-name').value.trim();
  const r = document.getElementById('inp-role').value.trim();
  const p = document.getElementById('inp-phone').value.trim();
  const e = document.getElementById('inp-email').value.trim();
  document.getElementById('sig-preview').innerHTML = buildSig(n, r, p, e);
}

function copyHTML() {
  const n = document.getElementById('inp-name').value.trim();
  const r = document.getElementById('inp-role').value.trim();
  const p = document.getElementById('inp-phone').value.trim();
  const e = document.getElementById('inp-email').value.trim();
  const html = buildSig(n, r, p, e);

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(html).then(showCopied).catch(() => fallbackCopy(html));
  } else {
    fallbackCopy(html);
  }
}

function fallbackCopy(html) {
  const ta = document.createElement('textarea');
  ta.value = html;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showCopied();
}

function showCopied() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✓ HTML copiado!';
  btn.classList.add('success');
  setTimeout(() => {
    btn.textContent = 'Copiar HTML da assinatura';
    btn.classList.remove('success');
  }, 2500);
}

render();
</script>
</body>
</html>
